body:
  text: 曹嘉之晉紀文帝甘露二年諸葛誕作亂諸葛誕以氣邁稱常倚柱讀書霹靂震其柱誕讀書自若書鈔一百五十二御覽十三又一百八十七事類賦注雷景元三年殺嵇康康刑于東市顧日影援琴而彈文選思舊賦注武帝泰始元年以荀勖為中書監中書監令常同車入朝至和嶠為令時而荀勖為監嶠意強抗專車而坐乃使監令異車自嶠始也世說注三書鈔泰始十年以山濤為吏部尚書山濤舉阮咸為吏部郎三上武帝不能用也文選五君咏注汝南史曜字季茂為山濤所知父為征南府小吏鄉人周浚一見曜而友之配之妹官至中書郎類聚四十八御覽二百二十太康二年以羊暨弟篇奉祜嗣羊祜子暨為青州刺史暨牛于州產犢及暨去職以官舍所生遺之而去類聚五十九十四御覽二百五十六太康四年以荀勖守尚書令詔曰周之冢宰今尚書令皆古百揆之任以其亮采惠疇熙帝之載實允于此勖肆力先朝庸勳超格受終之揆恊于大麓故授以此任也書鈔五十九荀勖自中書監遷尚書令人賀之勖曰奪我鳳皇池何賀之有初學記十一惠帝永熙元年以楊駿輔政張華懼后族之盛作女史箴文選女史箴注太安二年復以王戎為司徒王戎再至司徒委事掾屬乘小馬從便門出見者不知是台司也御覽二百八愍帝洛陽傾覆荀藩等奉之趣許昌閻鼎與藩等謀奉帝入關藩與周顗等不欲劉疇等中塗叛顗等逃過江鼎追疇殺之劉疇字王喬彭城人父訥司隸校尉疇善談名理曾避亂塢壁有賈胡數百欲害之疇無懼色援笳而吹之為出塞入塞之聲以動其遊客之思于是群胡皆倚泣而去之遂得免位至司徒左長史世說注五類聚四十四書鈔一百一十一御覽五百八十一疇有重名永嘉中為閻鼎所害司徒蔡謨每嘆曰若使劉王喬得南渡司徒公之美選也世說注五元帝劉琨等遣使勸進劉琨作勸進表無所點竄封印既畢對使者流涕而遣之文選勸進表注
